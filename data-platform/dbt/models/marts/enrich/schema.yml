version: 2

models:
  - name: marts_enrich_acteurs_closed_replaced
    description: Etablissements de l'Annuaire Entreprises (AE) qui ont été
      | fermés et remplacés par un autre établissement
    columns:
      - name: acteur_id
        description: Identifiant unique de l'acteur
        data_tests:
          - not_null
      - name: acteur_statut
        description: Statut de l'acteur dans QFDMO
      - name: acteur_siret
        description: SIRET de l'acteur fermé
        data_tests:
          - not_null
      - name: suggest_siret
        description: SIRET de l'établissement qui remplace l'acteur fermé
        data_tests:
          - not_null
      - name: acteur_nom
        description: Nom de l'acteur fermé
      - name: suggest_nom
        description: Nom de l'établissement qui remplace l'acteur fermé
      - name: noms_nombre_mots_commun
        description: Nombre de mots en commun entre le nom de l'acteur et celui du remplaçant
        data_type: integer
      - name: acteur_commentaires
        description: Commentaires de l'acteur pour debug
      - name: naf
        description: Code NAF de l'établissement remplaçant
      - name: ville
        description: Ville de l'établissement remplaçant
      - name: code_postal
        description: Code postal de l'établissement remplaçant
      - name: adresse
        description: Adresse de l'établissement remplaçant
      - name: replacement_priority
        description: "Priorité du remplacement (1 = meilleur match)"
        data_type: integer
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - closed
        - ae
        - annuaire_entreprises
        - etablissement

  - name: marts_enrich_acteurs_closed_candidates
    description: Etablissements fermés de l'Annuaire Entreprises (AE) qui pourraient être remplacés
    columns:
      - name: acteur_siret
        description: SIRET de l'établissement fermé
        data_tests:
          - not_null
      - name: unite_est_actif
        description: Si l'unité légale est toujours active
        data_type: boolean
      - name: etab_est_actif
        description: Si l'établissement est toujours actif (toujours FALSE ici)
        data_type: boolean
        data_tests:
          - accepted_values:
              arguments:
                values: [false]
      - name: etab_code_postal
        description: Code postal de l'établissement fermé
      - name: etab_adresse
        description: Adresse de l'établissement fermé
      - name: etab_naf
        description: Code NAF de l'établissement fermé
      - name: acteur_id
        description: Identifiant unique de l'acteur dans QFDMO
        data_tests:
          - not_null
      - name: acteur_statut
        description: Statut de l'acteur dans QFDMO
      - name: acteur_nom
        description: Nom de l'acteur dans QFDMO
      - name: acteur_nom_normalise
        description: Nom de l'acteur normalisé pour faciliter les comparaisons
      - name: acteur_commentaires
        description: Commentaires de l'acteur pour debug
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - closed
        - ae
        - annuaire_entreprises
        - etablissement

  - name: marts_enrich_acteurs_closed_suggest_not_replaced_etablissement
    description: Acteurs fermés non remplacés (établissement fermé)
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - closed
        - ae
        - annuaire_entreprises
        - etablissement

  - name: marts_enrich_acteurs_closed_suggest_not_replaced_unite
    description: Acteurs fermés non remplacés (unité fermée)
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - closed
        - ae
        - annuaire_entreprises
        - etablissement

  - name: marts_enrich_acteurs_closed_suggest_replaced_other_siren
    description: Acteurs fermés remplacés par un SIRET d'un autre SIREN
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - closed
        - ae
        - annuaire_entreprises
        - etablissement

  - name: marts_enrich_acteurs_closed_suggest_replaced_same_siren
    description: Acteurs fermés remplacés par un SIRET du même SIREN
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - closed
        - ae
        - annuaire_entreprises
        - etablissement

  - name: marts_enrich_acteurs_rgpd_suggest
    description: Suggestions RGPD basées sur les noms des dirigeants AE
    config:
      materialized: view
      tags:
        - marts
        - enrich
        - ae
        - annuaire_entreprises
        - unite_legale
        - rgpd

  - name: marts_enrich_acteurs_villes_candidates
    description: Candidats pour suggestions de correction de ville
    config:
      materialized: table
      tags:
        - marts
        - enrich
        - villes
        - cities
        - ban

  - name: marts_enrich_acteurs_villes_suggest_new
    description: Suggestions de changement de ville (ancienne -> nouvelle)
    config:
      materialized: view
      alias: marts_enrich_acteurs_villes_suggest_new
      tags:
        - marts
        - enrich
        - villes
        - cities
        - ban
        - acteurs
        - nouvelle
        - new

  - name: marts_enrich_acteurs_villes_suggest_typo
    description: Suggestions de correction d'orthographe de ville
    config:
      materialized: view
      alias: marts_enrich_acteurs_villes_suggest_typo
      tags:
        - marts
        - enrich
        - villes
        - cities
        - ban
        - acteurs
        - typo
        - ortographe

