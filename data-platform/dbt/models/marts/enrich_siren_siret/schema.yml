version: 2

models:
  - name: marts_enrich_siret_from_siren
    description: >
      Propose un SIRET pour les acteurs ayant un SIREN sans SIRET :
      d'abord si un seul établissement actif AE existe pour le SIREN (tous codes postaux),
      sinon si un seul établissement actif AE correspond au couple SIREN + code postal.
    columns:
      - name: identifiant_unique
        description: "L'identifiant unique de l'acteur"
        data_tests:
          - not_null
      - name: siren
        description: "SIREN de l'acteur"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 9
      - name: siret
        description: "SIRET proposé (établissement actif unique dans AE)"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 14
      - name: code_postal
        description: "Code postal utilisé pour la correspondance"
    config:
      materialized: table
      indexes:
        - columns: ['identifiant_unique']
      tags:
        - marts
        - enrich
        - siren_siret
  - name: marts_enrich_siren_from_siret
    description: "Propose un SIREN pour les acteurs ayant un SIRET sans SIREN, lorsqu'un établissement actif AE correspond au SIRET."
    columns:
      - name: identifiant_unique
        description: "L'identifiant unique de l'acteur"
        data_tests:
          - not_null
      - name: siren
        description: "SIREN de l'acteur"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 9
      - name: siret
        description: "SIRET proposé (établissement actif unique dans AE)"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 14
      - name: code_postal
        description: "Code postal utilisé pour la correspondance"
    config:
      materialized: table
      indexes:
        - columns: ['identifiant_unique']
      tags:
        - marts
        - enrich
        - siren_siret
