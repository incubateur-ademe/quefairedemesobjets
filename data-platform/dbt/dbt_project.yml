# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: "qfdmo"
version: "1.0.0"

# This setting configures which "profile" dbt uses for this project.
profile: "default"

flags:
  send_anonymous_usage_stats: false

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

on-run-start:
  - "{{ create_udf_encode_base57() }}"
  - "{{ create_udf_uuid_to_int() }}"
  - "{{ create_udf_safe_divmod() }}"
  - "{{ create_udf_columns_concat_unique_non_empty() }}"
  - "{{ create_udf_columns_words_in_common_count() }}"
  - "{{ create_udf_normalize_string_alpha_for_match() }}"
  - "{{ create_udf_ae_string_cleanup() }}"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  # by default the tables are unlogged because the warehouse is optimized for performance
  # and can be rebuild from scratch
  +unlogged: true
  +materialized: table
  qfdmo:
    intermediate:
      ae:
        +unlogged: false
      ban:
        +unlogged: false
      geo:
        +unlogged: false
    exposure:
      stats:
        # for stats tables, we want to keep the historical data even if PG crashs
        +unlogged: false
        on_schema_change: "append_new_columns"