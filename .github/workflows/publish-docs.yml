name: 📚 Deploy Documentation

on:
  workflow_dispatch:
  push:
    branches: [main]

# Address actions/missing-workflow-permissions rule in
# code scanning alerts
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-slim
    steps:
    - name: Check out the code
      uses: actions/checkout@v7.0.0
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
    - uses: actions/cache@v6.1.0
      name: Define a cache for the virtual environment based on the docs dependencies lock file
      with:
        path: ./docs/.venv
        key: venv-docs-${{ hashFiles('docs/uv.lock') }}
    - name: Install the docs project dependencies
      working-directory: docs
      run: uv sync
    - name: Build the documentation
      working-directory: docs
      run: make build-docs
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build  # Path to your built HTML files
