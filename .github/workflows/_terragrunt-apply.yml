name: 🧱 Terragrunt apply/destroy

on:
  workflow_call:
    inputs:
      command:
        description: "terragrunt command (apply or destroy)"
        type: string
        required: false
        default: apply
      pr_number:
        description: "Pull request number — materialises infrastructure/environments/preview/pr-<n> from _template, exposed as PR_NUMBER"
        type: string
        required: true
      image_tag:
        description: "Webapp image tag to deploy (e.g. pr-123-abc1234). Not needed for destroy."
        type: string
        required: false
        default: "unused"
      environment:
        description: "GitHub environment to load secrets from (e.g. preview)"
        type: string
        required: true

jobs:
  terragrunt:
    name: 🧱 Terragrunt ${{ inputs.command }} (pr-${{ inputs.pr_number }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      # Scaleway provider + S3 backend creds
      SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
      SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
      SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      # The S3 backend block generated by root.hcl reads access_key/secret_key
      # from TF vars; explicit TF_VAR_ env vars take precedence over the
      # placeholder inputs in root.hcl.
      TF_VAR_access_key: ${{ secrets.SCW_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.SCW_SECRET_KEY }}
      TF_VAR_project_id: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
      TF_VAR_organization_id: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}

      # AWS_*: the S3 backend uses the AWS SDK and reads these too
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
      AWS_DEFAULT_REGION: fr-par

      # Inputs read by the preview templates via get_env(...)
      PR_NUMBER: ${{ inputs.pr_number }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      PREVIEW_SECRET_KEY: ${{ secrets.PREVIEW_SECRET_KEY }}
      SAMPLE_DB_URI: ${{ secrets.SAMPLE_DB_URI }}

      TG_NON_INTERACTIVE: "true"

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.10.0"
          tofu_wrapper: false

      - name: Install Terragrunt
        run: |
          TG_VERSION="0.69.0"
          curl -fsSL -o /usr/local/bin/terragrunt \
            "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Install postgres client (for null_resource provisioners)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Materialise per-PR terragrunt stack from _template
        run: |
          set -euo pipefail
          SRC="infrastructure/environments/preview/_template"
          DST="infrastructure/environments/preview/pr-${{ inputs.pr_number }}"
          if [[ ! -d "$DST" ]]; then
            cp -r "$SRC" "$DST"
            echo "Materialised $DST from $SRC"
          else
            echo "$DST already exists, leaving as-is"
          fi
          ls -la "$DST"

      - name: Terragrunt init + ${{ inputs.command }}
        working-directory: infrastructure/environments/preview/pr-${{ inputs.pr_number }}
        run: |
          terragrunt run-all init --terragrunt-non-interactive 2>&1 | tee init.log
          terragrunt run-all ${{ inputs.command }} --terragrunt-non-interactive --auto-approve 2>&1 | tee apply.log
          {
            echo "## Terragrunt ${{ inputs.command }} (pr-${{ inputs.pr_number }})"
            echo
            echo '```'
            tail -n 100 apply.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

permissions:
  contents: read
