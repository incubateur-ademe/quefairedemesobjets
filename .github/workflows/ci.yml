name: 🤖 CI

on:
  workflow_call:

env:
  PGHOST: localhost
  PGPORT: 5432
  PGUSER: webapp
  PGPASSWORD: webapp # pragma: allowlist secret
  PGDATABASE: webapp
  UV_PROJECT_ENVIRONMENT: .venv
  BASE_URL: http://localhost:8000
  DATABASE_URL: "postgres://webapp:webapp@localhost:5432/webapp" # pragma: allowlist secret
  SECRET_KEY: coucou # pragma: allowlist secret
  CI: true

jobs:
  backend_linter:
    name: 📝 Backend Linter
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Setup webapp Python environment
        uses: ./.github/actions/setup-backend
        with:
          working-directory: webapp
          uv-groups: "--group dev"

      - name: Setup data-platform Python environment
        uses: ./.github/actions/setup-backend
        with:
          working-directory: data-platform
          uv-groups: "--group dev"

      - name: Install Terragrunt and OpenTofu
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec
        with:
          tg_version: "0.83.2"
          tofu_version: "1.10.3"
      - name: Check code formatting (Black + Ruff, webapp + data-platform)
        run: make check-format
      - name: Run Tofu format check
        run: tofu fmt -recursive -check infrastructure
      - name: Run Terragrunt format check
        run: terragrunt hcl fmt -check infrastructure

  frontend_linter:
    name: 📝 Frontend Linter
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend
        with:
          working-directory: webapp

      - name: Check code formatting
        run: npm run format:check
        working-directory: webapp

  backend_unit_tests:
    name: ✅ Backend Unit Tests
    needs: backend_linter
    uses: ./.github/workflows/_backend-test-job.yml
    with:
      make-target: unit-test
      check-migrations: true

  backend_integration_tests:
    name: ✅ Backend Integration Tests
    needs: backend_linter
    uses: ./.github/workflows/_backend-test-job.yml
    with:
      make-target: integration-test

  backend_data_tests:
    name: ✅ Backend Data Tests
    needs: backend_linter
    uses: ./.github/workflows/_backend-test-job.yml
    with:
      working-directory: data-platform
      make-target: dags-test

  frontend_tests:
    name: ✅ Frontend Tests
    runs-on: ubuntu-slim
    needs: frontend_linter
    steps:
      - uses: actions/checkout@v6

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend

      - name: Run tests
        run: |
          cp .env.template .env
          npm run test
        working-directory: webapp

# Address actions/missing-workflow-permissions rule in
# code scanning alerts
permissions:
  contents: read
