name: 🐳 Docker image for the webapp

on:
  workflow_dispatch:
    inputs:
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      environment:
        required: true
        type: string
      ref:
        description: "Git ref to checkout (defaults to the event's ref)"
        required: false
        type: string
        default: ""

env:
  SCALEWAY_REGISTRY: rg.fr-par.scw.cloud
  SCALEWAY_NAMESPACE: ns-qfdmo

jobs:
  build-and-push-image:
    name: 🐳 Build and push webapp Docker image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: "[🟣 Scaleway] Log in to the Scaleway Container registry"
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ${{ env.SCALEWAY_REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: "[🟣 Scaleway] Build and push webapp Docker image"
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: webapp
          file: webapp/Dockerfile
          # Scaleway Serverless Containers only run amd64
          platforms: linux/amd64
          cache-from: type=gha,scope=webapp
          cache-to: type=gha,scope=webapp,mode=max
          push: true
          tags: ${{ env.SCALEWAY_REGISTRY }}/${{ env.SCALEWAY_NAMESPACE }}/webapp:${{ inputs.image_tag }}

permissions:
  contents: read
