# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://docs.github.com/en/code-security/tutorials/secure-your-dependencies/optimizing-pr-creation-version-updates

version: 2

updates:
  - package-ecosystem: "uv"
    directories:
      - "/webapp"
      - "/data-platform"
    open-pull-requests-limit: 100
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00" # UTC
    cooldown:
      default-days: 7
    allow:
      dependency-type: "all"
    groups:
      python-production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      python-development-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/webapp"
    open-pull-requests-limit: 100
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:15" # UTC
    cooldown:
      default-days: 7
    allow:
      dependency-type: "all"
    groups:
      # Named groups (specific packages get their own PRs)
      babel:
        patterns:
          - "@babel/*"
      parcel:
        patterns:
          - "@parcel/*"
          - "parcel"
          - "parcel*"
      protobufjs:
        patterns:
          - "@protobufjs/*"
          - "protobufjs"
      swc:
        patterns:
          - "@swc/*"
          - "swc"
      mapbox:
        patterns:
          - "@mapbox/*"
          - "mapbox*"
      sentry:
        patterns:
          - "@sentry/*"
          - "sentry*"
      jest:
        patterns:
          - "*jest*"
          - "@types/jest"
      eslint:
        patterns:
          - "*eslint*"
      hotwired:
        patterns:
          - "@hotwired/*"
      iframe-resizer:
        patterns:
          - "@iframe-resizer/*"
      maplibre:
        patterns:
          - "maplibre-gl"
          - "@maplibre/*"
      postcss:
        patterns:
          - "postcss*"
      playwright:
        patterns:
          - "*playwright*"
      gouvfr:
        patterns:
          - "@gouvfr/*"
      testing:
        patterns:
          - "@testing-library/*"
      typescript-toolchain:
        patterns:
          - "typescript*"
          - "ts-jest"
          - "ts-node"

      # Catch-all: remaining deps grouped by semver
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 100
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:30" # UTC
    cooldown:
      default-days: 7
    allow:
      dependency-type: "all"
    groups:
      github-actions-all:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directories:
      - "/infrastructure/modules/*"
      - "/infrastructure/environments/*/*"
    open-pull-requests-limit: 100
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:45" # UTC
    allow:
      dependency-type: "all"
    cooldown:
      default-days: 7
    groups:
      terraform-all:
        patterns:
          - "*"
