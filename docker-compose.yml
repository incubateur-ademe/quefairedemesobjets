---
x-airflow-common: &airflow-common
  tmpfs:
    - /tmp
  env_file:
    - ./data-platform/dags/.env
  volumes:
    - ./data-platform/config:/opt/airflow/config
    - ./data-platform/dags:/opt/airflow/dags
    - ./data-platform/dbt:/opt/airflow/dbt
    - ./data-platform/logs:/opt/airflow/logs
    - ./data-platform/plugins:/opt/airflow/plugins
    - ./data-platform/scripts:/opt/airflow/scripts
  # Voir la doc et s'assurer que AIRFLOW_UID est
  # définit dans le .env pour correspondre à votre UID
  # sed -i '/^AIRFLOW_UID=/d' .env && echo "AIRFLOW_UID=$(id -u)" >> .env
  user: "${AIRFLOW_UID:-50000}:0"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on: &airflow-common-depends-on
    airflow-db:
      condition: service_healthy

services:
  lvao-webapp-db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      - POSTGRES_USER=webapp
      - POSTGRES_PASSWORD=webapp # pragma: allowlist secret
      - POSTGRES_DB=webapp
      - POSTGRES_MULTIPLE_EXTENSIONS=postgis
    volumes:
      - ./webapp_dbdata:/var/lib/postgresql/data:delegated
    expose:
      - 5432
    ports:
      - 6543:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "webapp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    profiles: [lvao, airflow, webapp]
  lvao-warehouse-db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      - POSTGRES_USER=warehouse
      - POSTGRES_PASSWORD=warehouse # pragma: allowlist secret
      - POSTGRES_DB=warehouse
      - POSTGRES_MULTIPLE_EXTENSIONS=postgis
    volumes:
      - ./warehouse_dbdata:/var/lib/postgresql/data:delegated
    expose:
      - 5432
    ports:
      - 8765:5432
    profiles: [airflow, webapp]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
  lvao-proxy:
    build:
      context: ./webapp
      dockerfile: nginx/Dockerfile
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./webapp/nginx/certs:/etc/nginx/ssl
      - ./webapp/staticfiles:/app/staticfiles
    env_file:
      - path: ./webapp/.env
        required: false
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN:-quefairedemesdechets.ademe.local}
      - PORT=80
      - NGINX_DISABLE_CACHE=${NGINX_DISABLE_CACHE:-0}
      - UPSTREAM_HOST=host.docker.internal:8000
      - SSL_CERT_PATH=/etc/nginx/ssl/${BASE_DOMAIN:-quefairedemesdechets.ademe.local}.pem
      - SSL_CERT_KEY_PATH=/etc/nginx/ssl/${BASE_DOMAIN:-quefairedemesdechets.ademe.local}-key.pem
    profiles: [lvao]
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow # pragma: allowlist secret
      POSTGRES_DB: airflow
    volumes:
      - ./airflow_dbdata:/var/lib/postgresql/data
    ports:
      - 7654:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    profiles: [airflow]

  airflow-webserver:
    <<: *airflow-common

    environment:
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    user: "0:0"
    build:
      context: .
      dockerfile: data-platform/airflow-webserver.Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
    profiles: [airflow]

  airflow-scheduler:
    <<: *airflow-common
    env_file:
      - ./data-platform/dags/.env
    build:
      context: .
      dockerfile: data-platform/airflow-scheduler.Dockerfile
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *airflow-common-depends-on
      airflow-webserver:
        condition: service_healthy
    profiles: [airflow]

  webapp:
    env_file:
      - ./webapp/.env
    build:
      context: ./webapp
      dockerfile: Dockerfile
    environment:
      # Override local settings (localhost:6543) with docker network hostname/port
      DATABASE_URL: postgres://webapp:webapp@lvao-webapp-db:5432/webapp # pragma: allowlist secret
      DB_WAREHOUSE: postgres://warehouse:warehouse@lvao-warehouse-db:5432/warehouse # pragma: allowlist secret
    depends_on:
      lvao-webapp-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    profiles: [webapp]