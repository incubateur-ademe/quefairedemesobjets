<turbo-frame
    data-next-autocomplete-target="results" id="{{ turbo_frame_id }}"
    data-iframe-ignore
    class="qf-peer qf-fixed qf-z-50 qf-bg-white qf-shadow-md qf-rounded-b-lg qf-overflow-y-auto {{ extra_classes }}"
    style="--underline-img: linear-gradient(0deg, currentColor, currentColor);"
>
    {# Optional live region for assistive tech. Subclasses provide a #}
    {# role=status element here that re-announces on each frame swap. #}
    {% block status %}{% endblock %}
    <ul
        id="{{ turbo_frame_id }}-listbox"
        role="listbox"
        class="qf-p-0 qf-m-0 qf-text-left qf-flex qf-flex-col"
    >
        {% block results %}{% endblock %}
    </ul>
</turbo-frame>
