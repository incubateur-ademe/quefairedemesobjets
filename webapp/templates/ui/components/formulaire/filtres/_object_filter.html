<div data-search-solution-form-target="sousCategoryObjetGroup" class="fr-mt-3w fr-px-1v fr-input-group {% if hidden %}qf-hidden{% endif %}">
    <div
        data-controller="formulaire-synonyme-autocomplete"
        data-action="next-autocomplete:commit->formulaire-synonyme-autocomplete#commit"
        data-with-controls="{{ is_carte|yesno:'false,true' }}"
        data-without-zone="{{ is_carte|yesno:'false,true' }}"
        data-with-dynamic-form-panel="{{ is_carte|yesno:'false,true' }}"
    >
        <div class="form-group">
            {{ form.sous_categorie_objet.label_tag }}
            {% if form.sous_categorie_objet.help_text %}
                <span class="fr-hint-text fr-mt-1v" id="{{ form.sous_categorie_objet.id_for_label }}_helptext">
                    {{ form.sous_categorie_objet.help_text }}
                </span>
            {% endif %}
            {{ form.sous_categorie_objet }}
            {{ form.sc_id }}
        </div>
    </div>
    <p class="fr-error-text fr-mt-1v qf-hidden" data-search-solution-form-target="sousCategoryObjetError">
        Veuillez indiquer puis sélectionner un objet dans la liste déroulante
    </p>
</div>
