<span>
    <a
        href="{% block href %}{{ result.url }}{% endblock %}"
        data-turbo="false"
        class="fr-link group-aria-[selected=true]:qf-outline group-aria-[selected=true]:qf-outline-2 group-aria-[selected=true]:qf-outline-blue-france-sun-113-625 group-aria-[selected=true]:qf-outline-offset-2"
        tabindex="0"
        {% block anchor_attrs %}{% endblock %}
    >
        {% block nom %}
        {{ result|capfirst }}
        {% endblock nom %}
    </a>
</span>

{% block parent %}{% endblock parent %}
