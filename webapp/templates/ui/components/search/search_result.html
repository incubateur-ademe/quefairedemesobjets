<a
    href="{% block href %}{{ result.url }}{% endblock %}"
    data-turbo="false"
    class="fr-link"
    tabindex="0"
    data-action="click->analytics#captureSearchResultClick"
    {% block tracking_attrs %}{% endblock %}
>
    {% block nom %}
    {{ result|capfirst }}
    {% endblock nom %}
</a>

{% block parent %}{% endblock parent %}
